# Spring Boot runtime configuration.
# Keep comments in ASCII here so Windows terminals and Maven always read the YAML safely.

server:
  # Backend HTTP port. Vite proxies /api requests to this port in development.
  port: 8080

spring:
  application:
    # Application name used in logs and future service metadata.
    name: admin-backend

  datasource:
    # H2 file database. The file is generated under backend/data.
    url: jdbc:h2:file:./data/admin;MODE=MySQL;DATABASE_TO_UPPER=false
    # H2 JDBC driver class.
    driver-class-name: org.h2.Driver
    # Local learning database account.
    username: sa
    password:

  jpa:
    hibernate:
      # update lets Hibernate create or update tables from Entity classes.
      ddl-auto: update
    # Print SQL in the console so we can learn what JPA runs.
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      # Enable browser console at /h2-console.
      enabled: true
      path: /h2-console
